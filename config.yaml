# share-it config

# Where uploaded files are stored inside the container.
# Mounted to ./data on the host via docker-compose.
data_dir: /data

# Files older than this are deleted on the next sweep.
max_age_days: 2

# How often the cleanup sweep runs.
cleanup_interval_sec: 3600

# Reject uploads larger than this (applies to anything not in text_extensions).
max_upload_mb: 1024

# Smaller cap for files listed in text_extensions.
max_upload_mb_text: 2

# secrets.token_urlsafe(N) -> ~1.3 * N chars. 16 -> 22-char tokens.
token_bytes: 16

# File extensions rejected by /upload. Lowercase, no leading dot.
# Empty list disables the check. Default: executables, installers, and
# OS-level scripts that auto-run on click.
blocked_extensions:
  # Windows executables / installers / shortcuts
  - exe
  - msi
  - scr
  - com
  - bat
  - cmd
  - pif
  - hta
  - cpl
  - msc
  - lnk
  - reg
  # Windows scripts that double-click-execute
  - vbs
  - vbe
  - wsf
  - wsh
  - ps1
  - psm1
  # macOS bundles / installers
  - app
  - dmg
  - pkg
  - command
  # Linux packages / runnables
  - deb
  - rpm
  - appimage
  - run
  - snap
  - flatpak
  # Mobile app packages
  - apk
  - aab
  - ipa
  - xapk
  # Java runnables
  - jar
  - war
  - ear
  # Native shared libraries
  - dll
  - so
  - dylib

# Files treated as text — limited by max_upload_mb_text and previewed inline.
text_extensions:
  - txt
  - md

# Files treated as images — rendered as thumbnails in the history grid and
# inline in the lightbox. Anything outside this list (and text_extensions)
# shows a generic file badge instead.
image_extensions:
  - jpg
  - jpeg
  - png
  - gif
  - webp
  - svg
  - bmp
  - ico
  - avif
